services:
  redis:
    image: redis:7-alpine
    container_name: flash-redis
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-flash}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD:-flash} --appendonly yes --maxmemory 100mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-flash}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    container_name: flash-nats
    ports:
      - "4222:4222" # Client
      - "8222:8222" # HTTP monitoring
    volumes:
      - nats-data:/data
    command: ["-js", "-sd", "/data", "-m", "8222"]
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: flash-clickhouse
    ports:
      - "8123:8123" # HTTP
      - "9000:9000" # Native
    environment:
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-flash}
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
      - CLICKHOUSE_DB=flash
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis-data:
  nats-data:
  clickhouse-data: